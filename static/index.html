<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Globular ADS-B: Interactive 3D Globe Flight Tracker</title>
        <meta
            name="description"
            content="Interactive 3D globe showing flight heatmaps and regularly updated ADS-B aircraft position and flight routes."
        />
        <meta name="theme-color" content="#1a1a1a" />
        <meta
            property="og:title"
            content="Globular ADS-B: Interactive 3D Globe Flight Tracker"
        />
        <meta
            property="og:description"
            content="Interactive 3D globe showing flight heatmaps and regularly updated ADS-B aircraft position and flight routes."
        />
        <meta property="og:type" content="website" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="canonical" href="https://globular-adsb.copey.dev/" />
        <link rel="preconnect" href="https://cdn.jsdelivr.net" />
        <link rel="stylesheet" href="style.css" />

        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "WebApplication",
                "name": "Globular ADS-B",
                "description": "Interactive 3D globe showing flight heatmaps and regularly updated ADS-B aircraft position and flight routes",
                "url": "https://globular-adsb.copey.dev/"
            }
        </script>

        <script src="//cdn.jsdelivr.net/npm/globe.gl"></script>
    </head>

    <body>
        <div id="globeViz"></div>
        <div id="top-right">
            <button id="recenter-btn">
                ◎<span class="recenter-text"> RECENTER</span>
            </button>
            <button id="fullscreen-btn">
                ⛶<span class="fullscreen-text"> FULL</span>
            </button>
        </div>
        <div id="controls">
            <div id="arc-key" style="display: none">
                <div id="arc-key-toggle">ACTIVE ROUTES</div>
                <div id="arc-key-body" class="visible">
                    <span class="key-item"
                        ><span
                            class="key-dot"
                            style="background: #00e676"
                        ></span
                        >Outbound</span
                    >
                    <span class="key-item"
                        ><span
                            class="key-dot"
                            style="background: #ff6d00"
                        ></span
                        >Inbound</span
                    >
                    <span class="key-item"
                        ><span
                            class="key-dot"
                            style="background: #c77dff"
                        ></span
                        >Both</span
                    >
                </div>
            </div>
            <div id="busiest-key" style="display: none">
                <div id="busiest-key-toggle">BUSIEST</div>
                <div id="busiest-key-body" class="visible"></div>
            </div>
            <div id="longest-key" style="display: none">
                <div id="longest-key-toggle">LONGEST</div>
                <div id="longest-key-body" class="visible"></div>
            </div>
            <div id="bottom-row">
                <label id="airports-label" class="chip"
                    ><span class="seg-long">INTERNATIONAL AIRPORTS</span><span class="seg-short">INT'L AIRPORTS</span><input
                        type="checkbox"
                        id="airports-toggle"
                /></label>
                <label id="bordermap-label" class="chip"
                    >BORDERS<input type="checkbox" id="bordermap-toggle"
                /></label>
                <label id="autopilot-label" class="chip"
                    >AUTOPILOT<input type="checkbox" id="autopilot-toggle"
                /></label>
                <div class="seg-ctrl" id="heatmap-mode-seg">
                    <button class="seg-btn" id="seg-satellite">
                        <span class="seg-long">SATELLITE</span><span class="seg-short">SAT</span>
                    </button>
                    <button class="seg-btn active" id="seg-allflights">
                        <span class="seg-long">HEATMAP: ALL FLIGHTS</span><span class="seg-short">HEATMAP: ALL</span>
                    </button>
                    <button class="seg-btn" id="seg-longhaul">
                        <span class="seg-long">HEATMAP: LONG-HAUL</span><span class="seg-short">HEATMAP: LONG</span>
                    </button>
                </div>
                <input
                    type="checkbox"
                    id="all-flights-toggle"
                    style="display: none"
                    checked
                />
                <label id="heatmap-label" class="chip"
                    ><span class="seg-long">LIVE LONG-HAUL TRAFFIC</span><span class="seg-short">LIVE TRAFFIC</span><input
                        type="checkbox"
                        id="heatmap-toggle"
                        checked
                /></label>
                <input
                    type="checkbox"
                    id="heatmap-enable-toggle"
                    checked
                    style="display: none"
                />
                <div id="heatmap-extra" class="visible">
                    <button id="last24h-btn">YDAY</button>
                    <span class="ctrl-sep">|</span>
                    <button id="video-download-btn">
                        ↓ 72H TIMELAPSE<span class="btn-approx">
                            | ~50MB</span
                        >
                    </button>
                    <div id="heatmap-progress">
                        <div id="heatmap-progress-bar">
                            <div id="heatmap-progress-fill"></div>
                        </div>
                        <span id="heatmap-progress-count"></span>
                    </div>
                    <button id="video-play-btn">▶ PLAY</button>
                    <div id="heatmap-slider-wrap">
                        <div id="slider-day-ticks"></div>
                        <input
                            type="range"
                            id="heatmap-time"
                            min="0"
                            max="1000"
                            step="1"
                            value="0"
                        />
                    </div>
                </div>
            </div>
        </div>
        <script>
            (function () {
                var seg = document.getElementById("heatmap-mode-seg");
                var btns = seg.querySelectorAll(".seg-btn");
                var heatmapEnableToggle = document.getElementById("heatmap-enable-toggle");
                var allFlightsToggle = document.getElementById("all-flights-toggle");
                btns.forEach(function (btn, i) {
                    btn.addEventListener("click", function () {
                        btns.forEach(function (b, j) {
                            b.classList.toggle("active", j === i);
                        });
                        var heatmapOn = i !== 0;
                        var allFlights = i <= 1;
                        if (heatmapEnableToggle.checked !== heatmapOn) {
                            heatmapEnableToggle.checked = heatmapOn;
                            heatmapEnableToggle.dispatchEvent(new Event("change"));
                        }
                        if (allFlightsToggle.checked !== allFlights) {
                            allFlightsToggle.checked = allFlights;
                            allFlightsToggle.dispatchEvent(new Event("change"));
                        }
                    });
                });
            })();
        </script>
        <script src="js/script.js" type="module"></script>
        <script
            defer
            src="https://static.cloudflareinsights.com/beacon.min.js"
            data-cf-beacon='{"token": "46adedbd97b249e8bbbac14602a7e531"}'
        ></script>
    </body>
</html>
