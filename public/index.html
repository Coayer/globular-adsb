<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Globular ADS-B: Interactive 3D Globe Flight Tracker</title>
        <meta name="description" content="ADS-B aircraft data displayed on an interactive 3D globe showing global flight routes without Mercator projection distortion. Click aircraft to show source and destination airports." />
        <meta name="theme-color" content="#1a1a1a" />
        <meta property="og:title" content="Globular ADS-B: Interactive 3D Globe Flight Tracker" />
        <meta property="og:description" content="ADS-B aircraft data displayed on an interactive 3D globe showing global flight routes without Mercator projection distortion. Click aircraft to show source and destination airports." />
        <meta property="og:type" content="website" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="canonical" href="https://globular-adsb.copey.dev/" />
        <link rel="preconnect" href="https://cdn.jsdelivr.net" />

        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebApplication",
            "name": "Globular ADS-B",
            "description": "Interactive 3D globe displaying real-time ADS-B aircraft data and flight routes",
            "url": "https://globular-adsb.copey.dev/"
        }
        </script>

        <style>
            body, #globeViz, canvas {
                margin: 0;
                background: #000;
            }
            #time {
                position: absolute;
                bottom: 8px;
                left: 8px;
                color: lightblue;
                font-family: monospace;
            }
            #autopilot-label {
                position: absolute;
                bottom: 8px;
                right: 8px;
                display: flex;
                align-items: center;
                gap: 8px;
                color: lightblue;
                font-family: monospace;
                user-select: none;
            }
            #autopilot-toggle {
                appearance: none;
                width: 36px;
                height: 20px;
                background: #444;
                border-radius: 10px;
                position: relative;
                cursor: pointer;
                transition: background 0.2s;
                flex-shrink: 0;
            }
            #autopilot-toggle::after {
                content: '';
                position: absolute;
                width: 14px;
                height: 14px;
                background: #fff;
                border-radius: 50%;
                top: 3px;
                left: 3px;
                transition: left 0.2s;
            }
            #autopilot-toggle:checked {
                background: cyan;
            }
            #autopilot-toggle:checked::after {
                left: 19px;
            }
        </style>

        <script src="//cdn.jsdelivr.net/npm/globe.gl"></script>
    </head>

    <body>
        <div id="globeViz"></div>
        <div id="time"></div>
        <label id="autopilot-label">
            <span>Autopilot</span>
            <input type="checkbox" id="autopilot-toggle" />
        </label>
        <script src="script.js" type="module"></script>
        <script
            defer
            src="https://static.cloudflareinsights.com/beacon.min.js"
            data-cf-beacon='{"token": "46adedbd97b249e8bbbac14602a7e531"}'
        ></script>
    </body>
</html>
